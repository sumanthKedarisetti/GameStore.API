services:
  postgres:
    image: postgres:16
    container_name: gamestore-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gamestore
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - gamestore-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: gamestore-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
    networks:
      - gamestore-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamestore-api
    environment:
      ASPNETCORE_HTTP_PORTS: "5005"
    ports:
      - "5005:5005"
    networks:
      - gamestore-net
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

networks:
  gamestore-net:
    driver: bridge

volumes:
  postgres-data:
  keycloak-data: